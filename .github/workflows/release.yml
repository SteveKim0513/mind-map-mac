name: Release

# 배포 자동화: 태그(vX.Y.Z) push 또는 수동 실행 시
# 빌드 → 서명 → 공증 → GitHub Release(SteveKim0513/mind-map-mac) 퍼블리시.
# 자세한 설명·시크릿 목록: docs/release/DEPLOY-UPDATE-SPEC.md §9

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {} # 수동 재배포 (현재 package.json 버전으로 빌드)

permissions:
  contents: write # GITHUB_TOKEN 으로 Release 생성/자산 업로드

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-14 # Apple Silicon (arm64) — 현재 배포 arch 와 동일
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Gate (typecheck + unit test)
        run: npm run typecheck && npm test

      # Build → sign → notarize → VERIFY. `npm run dist` ends with
      # scripts/verify-release.mjs, which fails the job if the artifact is broken
      # (productName missing, version drift, unsigned, feed sha mismatch).
      # Publish is a SEPARATE step so a failed verify NEVER ships.
      - name: Build · sign · notarize · verify
        run: npm run dist
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Only reached when the build verified clean. gh uses the repo's own
      # GITHUB_TOKEN (this repo IS the publish target), so no account-switch
      # foot-gun. --clobber path handles re-runs / pre-existing releases.
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="v$(node -p "require('./package.json').version")"
          fi
          echo "Publishing $TAG"
          ASSETS=(
            release/MindMap-*-arm64.dmg
            release/MindMap-*-arm64.dmg.blockmap
            release/MindMap-*-arm64-mac.zip
            release/MindMap-*-arm64-mac.zip.blockmap
            release/latest-mac.yml
          )
          NOTES_ARGS=(--generate-notes)
          [ -f "docs/release/notes/${TAG}.md" ] && NOTES_ARGS=(--notes-file "docs/release/notes/${TAG}.md")
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" --clobber "${ASSETS[@]}"
          else
            gh release create "$TAG" --target "$GITHUB_SHA" --title "${TAG#v}" "${NOTES_ARGS[@]}" "${ASSETS[@]}"
          fi
          echo "Published assets:"
          gh release view "$TAG" --json assets -q '.assets[].name'
